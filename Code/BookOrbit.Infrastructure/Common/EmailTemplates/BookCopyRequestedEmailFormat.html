<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Copy Requested</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f7fb; font-family:Arial, Helvetica, sans-serif; color:#1f2a37;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f7fb; padding:32px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(31,42,55,0.08);">
                    <tr>
                        <td style="background:linear-gradient(90deg,#4f46e5,#6366f1); padding:28px;">
                            <h1 style="margin:0; color:#ffffff; font-size:24px;">Book copy request received</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px;">
                            <p style="margin:0 0 16px 0; font-size:16px; line-height:1.6;">Hi there,</p>
                            <p style="margin:0 0 16px 0; font-size:16px; line-height:1.6;">We received your request for a copy of:</p>
                            
                            <!-- placeholder -->
                            <div style="background-color:#eef2ff; border-left:4px solid #4f46e5; padding:16px; border-radius:8px; font-weight:600; font-size:16px;">
                                {{bookTitle}}
                            </div>

                            <p style="margin:16px 0 0 0; font-size:16px; line-height:1.6;">
                                We’ll notify you as soon as it’s ready. Thank you for using BookOrbit.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 28px; background-color:#f9fafb; font-size:12px; color:#6b7280; text-align:center;">
                            If you did not make this request, you can ignore this email.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
